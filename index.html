<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PreBuild Help Centre</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              // Brand colour mapped to CSS variables so a future per-account
              // theme only ever has to override the variables below, not the
              // Tailwind config or any component class names.
              centri: {
                50: 'rgb(var(--primary-50) / <alpha-value>)',
                100: 'rgb(var(--primary-100) / <alpha-value>)',
                200: 'rgb(var(--primary-200) / <alpha-value>)',
                300: 'rgb(var(--primary-300) / <alpha-value>)',
                400: 'rgb(var(--primary-400) / <alpha-value>)',
                500: 'rgb(var(--primary-500) / <alpha-value>)',
                600: 'rgb(var(--primary-600) / <alpha-value>)',
                700: 'rgb(var(--primary-700) / <alpha-value>)',
                800: 'rgb(var(--primary-800) / <alpha-value>)',
                900: 'rgb(var(--primary-900) / <alpha-value>)',
                950: 'rgb(var(--primary-950) / <alpha-value>)',
              },
              dark: {
                bg: '#050b14',
                card: '#0f172a',
                border: '#1e293b',
              },
            },
            letterSpacing: {
              tighter: '-0.04em',
              tight: '-0.02em',
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1)',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', filter: 'blur(4px)' },
                '100%': { opacity: '1', filter: 'blur(0)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* CentriWeb brand blue (#4a9fe0) as an 11-step ramp. Any account-specific
         theme later only has to override these variables. */
      :root {
        --primary-50: 242 248 253;
        --primary-100: 224 239 250;
        --primary-200: 194 223 245;
        --primary-300: 150 200 237;
        --primary-400: 107 177 230;
        --primary-500: 74 159 224; /* #4a9fe0 */
        --primary-600: 36 137 214;
        --primary-700: 30 114 179;
        --primary-800: 24 92 144;
        --primary-900: 19 73 113;
        --primary-950: 13 50 78;
      }

      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }

      /* One consistent keyboard-focus treatment for every interactive
         element in the app (native buttons/links/inputs, and anything made
         focusable via tabIndex, e.g. clickable cards) — mouse users never
         see it (:focus-visible), keyboard users always do. Outline paints
         outside the border box and is unaffected by a parent's own
         overflow-hidden, so this is safe even on rounded, clipped cards. */
      :focus-visible {
        outline: 2px solid rgb(var(--primary-500));
        outline-offset: 2px;
      }

      /* Respect the OS-level reduced-motion preference for plain CSS/Tailwind
         keyframe animation (fade-in, slide-up, pulse, bounce, ping) — loading
         spinners are exempted since freezing them reads as "stuck", not calm. */
      @media (prefers-reduced-motion: reduce) {
        *:not(.animate-spin, .animate-spin *) {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Ambient background layer used on light backgrounds behind the content */
      .aurora-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-image: radial-gradient(at 10% 0%, rgba(var(--primary-500), 0.06) 0px, transparent 60%),
          radial-gradient(at 90% 0%, rgba(var(--primary-600), 0.05) 0px, transparent 60%),
          radial-gradient(at 50% 100%, rgba(var(--primary-500), 0.03) 0px, transparent 50%);
        z-index: -1;
        pointer-events: none;
      }

      body {
        font-feature-settings: 'ss01', 'ss02', 'cv01', 'cv02';
      }
    </style>
    <link rel="stylesheet" href="/guide-content.css" />
  </head>
  <body class="bg-dark-bg text-slate-200 font-sans antialiased selection:bg-centri-500 selection:text-white overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
